<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>System Error</title>

<style>
body{
    margin:0;
    height:100vh;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    font-family:Arial, sans-serif;
    color:white;
    overflow:hidden;
}

button{
    padding:20px 40px;
    font-size:20px;
    background:red;
    color:white;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

#countdown{
    font-size:90px;
    margin-top:30px;
}

#corruptedScreen{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    display:none;
    z-index:999;
}

#corruptedScreen img{
    width:100%;
    height:100%;
    object-fit:cover;
}
</style>
</head>
<body>

<button onclick="explodir()">Explodir celular</button>
<div id="countdown"></div>

<div id="corruptedScreen">
    <img src="corrompido.png">
</div>

<script>

function explodir(){

    let btn = document.querySelector("button");
    btn.style.display = "none";

    let countdown = document.getElementById("countdown");
    let tela = document.getElementById("corruptedScreen");

    let tempo = 3;
    countdown.innerText = tempo;

    // Vibração contínua enquanto conta
    if(navigator.vibrate){
        navigator.vibrate(100000); // vibra por 100 segundos (ou até parar)
    }

    let interval = setInterval(() => {
        tempo--;
        countdown.innerText = tempo;

        if(tempo <= 0){
            clearInterval(interval);
            countdown.innerText = "";

            // PARAR vibração imediatamente
            if(navigator.vibrate){
                navigator.vibrate(0);
            }

            // Mostrar imagem
            tela.style.display = "block";
        }

    },1000);
}

</script>

</body>
</html>
